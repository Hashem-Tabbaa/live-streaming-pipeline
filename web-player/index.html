<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thmanyah Live Stream Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 1rem 2rem;
      background: #1a1a2e;
      border-bottom: 2px solid #16213e;
      text-align: center;
    }

    header h1 {
      font-size: 1.5rem;
      color: #e94560;
    }

    header p {
      font-size: 0.85rem;
      color: #888;
      margin-top: 0.3rem;
    }

    .container {
      max-width: 960px;
      width: 100%;
      padding: 1.5rem;
    }

    /* --- Stream URL Input --- */
    .url-input-group {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .url-input-group input {
      flex: 1;
      padding: 0.7rem 1rem;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 0.9rem;
      font-family: monospace;
    }

    .url-input-group input:focus {
      outline: none;
      border-color: #e94560;
    }

    .url-input-group button {
      padding: 0.7rem 1.5rem;
      border: none;
      border-radius: 6px;
      background: #e94560;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .url-input-group button:hover { background: #c73e54; }

    /* --- Video Player --- */
    .player-wrapper {
      position: relative;
      width: 100%;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* --- Status Bar --- */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      font-size: 0.8rem;
      color: #888;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
    }

    .status-dot.live { background: #e94560; animation: pulse 1.5s infinite; }
    .status-dot.buffering { background: #ff9800; animation: pulse 0.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* --- Quality Selector --- */
    .quality-selector {
      margin-top: 1rem;
    }

    .quality-selector h3 {
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
      color: #aaa;
    }

    .quality-buttons {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .quality-buttons button {
      padding: 0.4rem 1rem;
      border: 1px solid #333;
      border-radius: 4px;
      background: #1a1a1a;
      color: #ccc;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .quality-buttons button:hover { border-color: #e94560; }
    .quality-buttons button.active {
      background: #e94560;
      border-color: #e94560;
      color: #fff;
    }

    /* --- Info Panel --- */
    .info-panel {
      margin-top: 1.5rem;
      padding: 1rem;
      background: #1a1a1a;
      border-radius: 6px;
      border: 1px solid #282828;
    }

    .info-panel h3 {
      font-size: 0.9rem;
      color: #e94560;
      margin-bottom: 0.5rem;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 0.5rem;
    }

    .info-item {
      display: flex;
      justify-content: space-between;
      padding: 0.3rem 0;
      border-bottom: 1px solid #222;
      font-size: 0.8rem;
    }

    .info-item .label { color: #888; }
    .info-item .value { color: #e0e0e0; font-family: monospace; }
  </style>
</head>
<body>

  <header>
    <h1>Thmanyah Live Stream</h1>
    <p>HLS Adaptive Bitrate Player — Powered by hls.js</p>
  </header>

  <div class="container">
    <!-- Stream URL Input -->
    <div class="url-input-group">
      <input
        type="text"
        id="streamUrl"
        placeholder="Paste HLS stream URL (.m3u8) — e.g., https://d1234.cloudfront.net/out/v1/channel/index.m3u8"
      />
      <button onclick="loadStream()">Play</button>
    </div>

    <!-- Video Player -->
    <div class="player-wrapper">
      <video id="videoPlayer" controls></video>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
      <div class="status-indicator">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">No stream loaded</span>
      </div>
      <span id="currentQuality">—</span>
    </div>

    <!-- Quality Selector -->
    <div class="quality-selector">
      <h3>Quality</h3>
      <div class="quality-buttons" id="qualityButtons">
        <button class="active" onclick="setQuality(-1)">Auto</button>
      </div>
    </div>

    <!-- Stream Info Panel -->
    <div class="info-panel">
      <h3>Stream Info</h3>
      <div class="info-grid" id="infoGrid">
        <div class="info-item">
          <span class="label">Status</span>
          <span class="value" id="infoStatus">Not connected</span>
        </div>
        <div class="info-item">
          <span class="label">Resolution</span>
          <span class="value" id="infoResolution">—</span>
        </div>
        <div class="info-item">
          <span class="label">Bandwidth</span>
          <span class="value" id="infoBandwidth">—</span>
        </div>
        <div class="info-item">
          <span class="label">Buffer Length</span>
          <span class="value" id="infoBuffer">—</span>
        </div>
        <div class="info-item">
          <span class="label">Latency</span>
          <span class="value" id="infoLatency">—</span>
        </div>
        <div class="info-item">
          <span class="label">Dropped Frames</span>
          <span class="value" id="infoDropped">—</span>
        </div>
      </div>
    </div>
  </div>

  <!--
    hls.js — Open-source HLS player library
    - Handles HLS manifest parsing, segment downloading, and ABR switching
    - Works in browsers without native HLS support (Chrome, Firefox)
    - Safari has native HLS support, so we use the native player as fallback
  -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>

  <script>
    const video = document.getElementById('videoPlayer');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    let hls = null;

    /**
     * Load and play an HLS stream.
     * 
     * How HLS playback works:
     * 1. Fetch master manifest (.m3u8) — lists all ABR renditions
     * 2. hls.js picks a rendition based on estimated bandwidth
     * 3. Fetch the rendition playlist — lists recent segments
     * 4. Download segments sequentially, buffer them
     * 5. Feed segments to the <video> element's MediaSource API
     * 6. Periodically re-fetch the rendition playlist for new segments (live)
     * 7. ABR algorithm monitors download speed, switches quality if needed
     */
    function loadStream() {
      const url = document.getElementById('streamUrl').value.trim();
      if (!url) return;

      // Clean up previous instance
      if (hls) {
        hls.destroy();
        hls = null;
      }

      setStatus('buffering', 'Connecting...');

      // Check if the browser supports HLS natively (Safari)
      if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Safari: use native HLS support
        video.src = url;
        video.addEventListener('loadedmetadata', () => {
          video.play();
          setStatus('live', 'Playing (native HLS)');
        });
        return;
      }

      // Chrome/Firefox: use hls.js
      if (!Hls.isSupported()) {
        setStatus('', 'HLS not supported in this browser');
        return;
      }

      hls = new Hls({
        // Enable low-latency mode (useful if LL-HLS is configured)
        lowLatencyMode: true,
        // Start with the lowest quality for fast startup, then adapt up
        startLevel: -1, // -1 = auto
        // Maximum buffer length in seconds
        maxBufferLength: 30,
      });

      hls.loadSource(url);
      hls.attachMedia(video);

      // --- Event Handlers ---

      hls.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
        // Manifest loaded — we now know all available quality levels
        video.play();
        setStatus('live', 'Playing');
        updateQualityButtons(data.levels);
        document.getElementById('infoStatus').textContent = 'Connected';
      });

      hls.on(Hls.Events.LEVEL_SWITCHED, (event, data) => {
        // ABR switched to a different quality level
        const level = hls.levels[data.level];
        document.getElementById('currentQuality').textContent =
          `${level.height}p @ ${(level.bitrate / 1000000).toFixed(1)} Mbps`;
        document.getElementById('infoResolution').textContent =
          `${level.width}x${level.height}`;
        highlightQualityButton(data.level);
      });

      hls.on(Hls.Events.ERROR, (event, data) => {
        if (data.fatal) {
          switch (data.type) {
            case Hls.ErrorTypes.NETWORK_ERROR:
              setStatus('', 'Network error — retrying...');
              hls.startLoad();
              break;
            case Hls.ErrorTypes.MEDIA_ERROR:
              setStatus('', 'Media error — recovering...');
              hls.recoverMediaError();
              break;
            default:
              setStatus('', `Fatal error: ${data.details}`);
              hls.destroy();
              break;
          }
        }
      });

      // --- Periodic Stats Update ---
      setInterval(updateStats, 1000);
    }

    function setStatus(state, text) {
      statusDot.className = 'status-dot ' + state;
      statusText.textContent = text;
    }

    function updateQualityButtons(levels) {
      const container = document.getElementById('qualityButtons');
      container.innerHTML = '<button class="active" onclick="setQuality(-1)">Auto</button>';

      levels.forEach((level, index) => {
        const btn = document.createElement('button');
        btn.textContent = `${level.height}p`;
        btn.onclick = () => setQuality(index);
        container.appendChild(btn);
      });
    }

    function setQuality(levelIndex) {
      if (!hls) return;
      // -1 = Auto (ABR decides), otherwise pin to a specific level
      hls.currentLevel = levelIndex;

      // Update button states
      const buttons = document.querySelectorAll('.quality-buttons button');
      buttons.forEach((btn, i) => {
        btn.classList.toggle('active', i === levelIndex + 1);
      });
    }

    function highlightQualityButton(levelIndex) {
      if (hls && hls.autoLevelEnabled) return; // Don't highlight when in auto mode
    }

    function updateStats() {
      if (!hls || !video) return;

      // Bandwidth estimate
      const bw = hls.bandwidthEstimate;
      if (bw) {
        document.getElementById('infoBandwidth').textContent =
          `${(bw / 1000000).toFixed(2)} Mbps`;
      }

      // Buffer length
      if (video.buffered.length > 0) {
        const bufferEnd = video.buffered.end(video.buffered.length - 1);
        const bufferLen = bufferEnd - video.currentTime;
        document.getElementById('infoBuffer').textContent =
          `${bufferLen.toFixed(1)}s`;
      }

      // Latency (difference between live edge and current playback position)
      if (hls.latency !== undefined) {
        document.getElementById('infoLatency').textContent =
          `${hls.latency.toFixed(1)}s`;
      }

      // Dropped frames
      const quality = video.getVideoPlaybackQuality?.();
      if (quality) {
        document.getElementById('infoDropped').textContent =
          quality.droppedVideoFrames;
      }
    }

    // Allow pressing Enter in the URL input to load
    document.getElementById('streamUrl').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') loadStream();
    });
  </script>

</body>
</html>
